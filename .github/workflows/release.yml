name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-24.04
            name: linux-amd64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04
            name: linux-arm64
          - target: aarch64-apple-darwin
            os: macos-14
            name: darwin-arm64

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools (ARM64 Linux)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV
          echo "CC_aarch64_unknown_linux_gnu=aarch64-linux-gnu-gcc" >> $GITHUB_ENV
          echo "CXX_aarch64_unknown_linux_gnu=aarch64-linux-gnu-g++" >> $GITHUB_ENV

      - name: Install system ORT (Linux — dynamic link, glibc 2.27 compatible)
        if: runner.os == 'Linux'
        run: |
          if [ "${{ matrix.target }}" = "aarch64-unknown-linux-gnu" ]; then
            ORT_ARCHIVE="onnxruntime-linux-aarch64-1.22.0"
          else
            ORT_ARCHIVE="onnxruntime-linux-x64-1.22.0"
          fi
          curl -sL "https://github.com/microsoft/onnxruntime/releases/download/v1.22.0/${ORT_ARCHIVE}.tgz" | tar xz -C /tmp
          sudo cp /tmp/${ORT_ARCHIVE}/lib/libonnxruntime.so.1.22.0 /usr/local/lib/
          sudo ln -sf libonnxruntime.so.1.22.0 /usr/local/lib/libonnxruntime.so
          sudo ln -sf libonnxruntime.so.1.22.0 /usr/local/lib/libonnxruntime.so.1
          sudo cp -r /tmp/${ORT_ARCHIVE}/include/* /usr/local/include/
          sudo ldconfig
          echo "ORT_LIB_LOCATION=/usr/local/lib" >> $GITHUB_ENV
          echo "ORT_PREFER_DYNAMIC_LINK=1" >> $GITHUB_ENV

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package and checksum
        run: |
          cd target/${{ matrix.target }}/release
          # Bundle ORT shared library for Linux (dynamic linking)
          if [ "${{ runner.os }}" = "Linux" ]; then
            cp /usr/local/lib/libonnxruntime.so.1.22.0 .
            tar czf ../../../clawmark-${{ matrix.name }}.tar.gz clawmark libonnxruntime.so.1.22.0
          else
            tar czf ../../../clawmark-${{ matrix.name }}.tar.gz clawmark
          fi
          cd ../../..
          if command -v sha256sum > /dev/null 2>&1; then
            sha256sum clawmark-${{ matrix.name }}.tar.gz > clawmark-${{ matrix.name }}.tar.gz.sha256
          else
            shasum -a 256 clawmark-${{ matrix.name }}.tar.gz > clawmark-${{ matrix.name }}.tar.gz.sha256
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: clawmark-${{ matrix.name }}
          path: |
            clawmark-${{ matrix.name }}.tar.gz
            clawmark-${{ matrix.name }}.tar.gz.sha256

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            clawmark-*.tar.gz
            clawmark-*.tar.gz.sha256
          generate_release_notes: true
